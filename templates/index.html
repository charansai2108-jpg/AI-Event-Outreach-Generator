<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Event Outreach</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: linear-gradient(to right, #141e30, #243b55);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card-box {
            background: white;
            color: black;
            width: 500px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        .title {
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .btn-custom {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
        }

    </style>

</head>

<body>

<div class="card-box">

    <h1 class="title">
        AI Event Outreach 🚀
    </h1>

    <form action="/generate" method="POST">

        <!-- Recipient Name -->
        <div class="mb-3">

            <input type="text"
                   class="form-control"
                   name="name"
                   placeholder="Recipient Name"
                   required>

        </div>

        <!-- Recipient Email -->
        <div class="mb-3">

            <input type="email"
                   class="form-control"
                   name="email"
                   placeholder="Recipient Email"
                   required>

        </div>

        <!-- Event Type -->
        <div class="mb-3">

            <select class="form-control"
                    name="event_type"
                    required>

                <option value="">
                    Select Event Type
                </option>

                <option>
                    Lunch Meeting
                </option>

                <option>
                    Workshop
                </option>

                <option>
                    Webinar
                </option>

                <option>
                    Birthday Party
                </option>

                <option>
                    Conference
                </option>

                <option>
                    Networking Event
                </option>

                <option>
                    Product Launch
                </option>

                <option>
                    Team Meeting
                </option>

            </select>

        </div>

        <!-- Event Title -->
        <div class="mb-3">

            <input type="text"
                   class="form-control"
                   name="event_title"
                   placeholder="Event Title"
                   required>

        </div>

        <!-- Venue -->
        <div class="mb-3">

            <input type="text"
                   class="form-control"
                   name="venue"
                   placeholder="Event Venue"
                   required>

        </div>

        <!-- Event Date -->
        <div class="mb-3">

            <input type="date"
                   class="form-control"
                   name="date"
                   required>

        </div>

        <!-- Additional Notes -->
        <div class="mb-3">

            <textarea class="form-control"
                      name="notes"
                      rows="3"
                      placeholder="Additional Notes"></textarea>

        </div>

        <!-- Sender Name -->
        <div class="mb-3">

            <input type="text"
                   class="form-control"
                   name="sender"
                   placeholder="Your Name"
                   required>

        </div>

        <!-- Submit Button -->
        <button type="submit"
                class="btn btn-primary btn-custom">

            Generate & Send Email

        </button>

    </form>

</div>

</body>
</html>
