<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Email Sent</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right,#141e30,#243b55);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }

        .result-card{
            background:white;
            color:black;
            width:700px;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.3);
        }

        pre{
            white-space:pre-wrap;
            font-size:16px;
        }

    </style>

</head>

<body>

<div class="result-card">

    <h1 class="text-success">
        ✅ Email Sent Successfully
    </h1>

    <hr>

    <h3>Generated AI Email:</h3>

    <pre>
{{ email_content }}
    </pre>

    <a href="/"
       class="btn btn-primary mt-3">

        Send Another Email

    <!DOCTYPE html>
<html>
<head>
    <title>Generated Email</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-5">

    <h2>Generated AI Email</h2>

    <pre id="emailText"
         class="border p-3 bg-light">
{{ email_content }}
    </pre>

    <button class="btn btn-success"
            onclick="copyEmail()">

        Copy Email

    </button>

    <a href="/"
       class="btn btn-primary">

        Generate Another

    </a>

    <script>

        function copyEmail() {

            const text =
                document.getElementById("emailText").innerText;

            navigator.clipboard.writeText(text);

            alert("Email copied!");

        }

    </script>

</div>

</body>
</html>
